<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auth System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-size: 2rem;
            font-weight: 700;
        }

        .logo i {
            font-size: 2.5rem;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 1rem;
        }

        .input-with-icon {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon {
            color: #667eea;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .remember-me label {
            color: #555;
            font-size: 0.95rem;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 25px 0;
            color: #888;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e1e1e1;
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e1e1e1;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .social-btn:hover {
            transform: translateY(-5px);
        }

        .facebook {
            background: #3b5998;
        }

        .google {
            background: #dd4b39;
        }

        .twitter {
            background: #1da1f2;
        }

        .toggle-form {
            text-align: center;
            color: #666;
            margin-top: 25px;
        }

        .toggle-link {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-block;
            margin-left: 5px;
        }

        .toggle-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Form validation styles */
        .form-input.error {
            border-color: #ff4757;
        }

        .error-message {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background: #2ed573;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: #ffd700;
        }

        /* Responsive styles */
        @media (max-width: 576px) {
            .form-container {
                padding: 40px 25px;
            }
            
            .form-header h1 {
                font-size: 1.8rem;
            }
            
            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .logo a {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 400px) {
            .form-container {
                padding: 35px 20px;
            }
            
            .social-login {
                gap: 10px;
            }
            
            .social-btn {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="index.html">
                <i class="fas fa-user-shield"></i>
                <span>AuthSystem</span>
            </a>
        </div>
        
        <div class="form-container">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>
            
            <div class="success-message" id="login-success">
                <i class="fas fa-check-circle"></i> Login successful! Redirecting...
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-with-icon">
                        <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                    <div class="error-message" id="login-email-error">Please enter a valid email address</div>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
                        <i class="fas fa-lock input-icon"></i>
                        <span class="password-toggle" id="login-password-toggle">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    <div class="error-message" id="login-password-error">Password must be at least 6 characters</div>
                </div>
                
                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="submit-btn" id="login-submit">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="divider">Or sign in with</div>
            
            <div class="social-login">
                <button class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn twitter">
                    <i class="fab fa-twitter"></i>
                </button>
            </div>
            
            <div class="toggle-form">
                Don't have an account? 
                <a href="register.html" class="toggle-link">Create Account</a>
            </div>
        </div>
        
        <div class="back-home">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');
        const loginPasswordToggle = document.getElementById('login-password-toggle');
        const loginSuccess = document.getElementById('login-success');
        const rememberMe = document.getElementById('remember-me');
        
        // Check if user data exists in localStorage
        function checkForSavedUser() {
            const savedEmail = localStorage.getItem('savedEmail');
            const savedRemember = localStorage.getItem('rememberMe') === 'true';
            
            if (savedEmail && savedRemember) {
                loginEmail.value = savedEmail;
                rememberMe.checked = true;
            }
        }
        
        // Password toggle visibility
        loginPasswordToggle.addEventListener('click', () => {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            
            // Toggle eye icon
            const icon = loginPasswordToggle.querySelector('i');
            if (type === 'text') {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Form validation functions
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function validatePassword(password) {
            return password.length >= 6;
        }
        
        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            
            // Add error class to input
            const inputId = elementId.replace('-error', '');
            const inputElement = document.getElementById(inputId);
            if (inputElement) {
                inputElement.classList.add('error');
            }
        }
        
        // Clear error message
        function clearError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.style.display = 'none';
            
            // Remove error class from input
            const inputId = elementId.replace('-error', '');
            const inputElement = document.getElementById(inputId);
            if (inputElement) {
                inputElement.classList.remove('error');
            }
        }
        
        // Real-time validation
        loginEmail.addEventListener('input', () => {
            if (validateEmail(loginEmail.value.trim())) {
                clearError('login-email-error');
            }
        });
        
        loginPassword.addEventListener('input', () => {
            if (validatePassword(loginPassword.value)) {
                clearError('login-password-error');
            }
        });
        
        // Login form submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            let isValid = true;
            
            // Validate email
            if (!validateEmail(loginEmail.value.trim())) {
                showError('login-email-error', 'Please enter a valid email address');
                isValid = false;
            } else {
                clearError('login-email-error');
            }
            
            // Validate password
            if (!validatePassword(loginPassword.value)) {
                showError('login-password-error', 'Password must be at least 6 characters');
                isValid = false;
            } else {
                clearError('login-password-error');
            }
            
            // If valid, proceed with login
            if (isValid) {
                // Save email if "Remember me" is checked
                if (rememberMe.checked) {
                    localStorage.setItem('savedEmail', loginEmail.value);
                    localStorage.setItem('rememberMe', 'true');
                } else {
                    localStorage.removeItem('savedEmail');
                    localStorage.setItem('rememberMe', 'false');
                }
                
                // Check if user exists in localStorage
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === loginEmail.value);
                
                if (user) {
                    // Check password (in a real app, this would be hashed)
                    if (user.password === loginPassword.value) {
                        // Show success message
                        loginSuccess.style.display = 'block';
                        
                        // Store current user session
                        localStorage.setItem('currentUser', JSON.stringify({
                            name: user.name,
                            email: user.email,
                            loginTime: new Date().toISOString()
                        }));
                        
                        // Simulate API call and redirect
                        setTimeout(() => {
                            alert(`Login successful! Welcome back, ${user.name}.`);
                            // In a real application, you would redirect to dashboard
                            // window.location.href = 'dashboard.html';
                            
                            // For this demo, we'll just reset the form
                            loginForm.reset();
                            loginSuccess.style.display = 'none';
                            
                            // Reset password visibility
                            loginPassword.setAttribute('type', 'password');
                            loginPasswordToggle.querySelector('i').className = 'fas fa-eye';
                        }, 1500);
                    } else {
                        showError('login-password-error', 'Incorrect password');
                    }
                } else {
                    showError('login-email-error', 'No account found with this email');
                }
            }
        });
        
        // Social login buttons
        const socialButtons = document.querySelectorAll('.social-btn');
        socialButtons.forEach(button => {
            button.addEventListener('click', () => {
                const platform = button.classList.contains('facebook') ? 'Facebook' :
                                button.classList.contains('google') ? 'Google' : 'Twitter';
                
                alert(`In a real application, this would redirect to ${platform} authentication`);
            });
        });
        
        // Forgot password link
        document.querySelector('.forgot-link').addEventListener('click', (e) => {
            e.preventDefault();
            const email = prompt('Enter your email to reset password:');
            if (email) {
                if (validateEmail(email)) {
                    alert(`Password reset link has been sent to ${email}`);
                } else {
                    alert('Please enter a valid email address');
                }
            }
        });
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', checkForSavedUser);
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.target.matches('.social-btn')) {
                loginForm.dispatchEvent(new Event('submit'));
            }
            
            if (e.key === 'Escape') {
                loginForm.reset();
                clearError('login-email-error');
                clearError('login-password-error');
            }
        });
    </script>
</body>
</html>
