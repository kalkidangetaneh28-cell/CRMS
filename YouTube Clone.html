<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', 'Arial', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            height: 56px;
            position: sticky;
            top: 0;
            background-color: #0f0f0f;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .menu-btn:hover {
            background-color: #272727;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 2px;
            text-decoration: none;
            color: white;
        }

        .logo-icon {
            color: #ff0000;
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .header-center {
            display: flex;
            flex: 0 1 728px;
            max-width: 728px;
        }

        .search-container {
            display: flex;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 0 16px;
            background-color: #121212;
            border: 1px solid #303030;
            border-right: none;
            border-radius: 40px 0 0 40px;
            color: white;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #1c62b9;
        }

        .search-btn {
            background-color: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            width: 64px;
            cursor: pointer;
            color: #888;
        }

        .search-btn:hover {
            background-color: #303030;
        }

        .voice-search-btn {
            background-color: #222;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: 12px;
            cursor: pointer;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background-color: #272727;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #065fd4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 240px;
            padding: 12px 0;
            background-color: #0f0f0f;
            position: fixed;
            top: 56px;
            bottom: 0;
            overflow-y: auto;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .sidebar-item:hover {
            background-color: #272727;
        }

        .sidebar-item.active {
            background-color: #272727;
        }

        .sidebar-icon {
            margin-right: 24px;
            font-size: 20px;
        }

        .sidebar-text {
            font-size: 14px;
        }

        .main-content {
            margin-left: 240px;
            padding: 24px;
            flex: 1;
        }

        .category-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .category-nav::-webkit-scrollbar {
            height: 0;
        }

        .category-btn {
            background-color: #272727;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
        }

        .category-btn:hover {
            background-color: #3f3f3f;
        }

        .category-btn.active {
            background-color: white;
            color: black;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .video-card {
            cursor: pointer;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #272727;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 3px 4px;
            border-radius: 4px;
            font-size: 12px;
        }

        .video-info {
            display: flex;
            gap: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #065fd4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }

        .video-details {
            flex: 1;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel-name {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .video-stats {
            font-size: 14px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .header-center {
                flex: 1;
            }
        }

        @media (max-width: 576px) {
            .header-right .icon-text {
                display: none;
            }
            
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" class="logo">
                <i class="fab fa-youtube logo-icon"></i>
                <span class="logo-text">YouTube</span>
            </a>
        </div>
        
        <div class="header-center">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search">
                <button class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button class="voice-search-btn">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
        
        <div class="header-right">
            <button class="icon-btn" title="Create">
                <i class="fas fa-video"></i>
            </button>
            <button class="icon-btn" title="Notifications">
                <i class="fas fa-bell"></i>
            </button>
            <div class="user-avatar">U</div>
        </div>
    </header>

    <div class="container">
        <nav class="sidebar" id="sidebar">
            <a href="#" class="sidebar-item active">
                <i class="fas fa-home sidebar-icon"></i>
                <span class="sidebar-text">Home</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fas fa-fire sidebar-icon"></i>
                <span class="sidebar-text">Trending</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fas fa-play-circle sidebar-icon"></i>
                <span class="sidebar-text">Subscriptions</span>
            </a>
            <hr style="border-color: #303030; margin: 12px 0;">
            <a href="#" class="sidebar-item">
                <i class="fas fa-history sidebar-icon"></i>
                <span class="sidebar-text">History</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fas fa-clock sidebar-icon"></i>
                <span class="sidebar-text">Watch Later</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="fas fa-thumbs-up sidebar-icon"></i>
                <span class="sidebar-text">Liked Videos</span>
            </a>
            <hr style="border-color: #303030; margin: 12px 0;">
            <h3 style="padding: 8px 24px; font-size: 16px; color: #aaa;">SUBSCRIPTIONS</h3>
            <a href="#" class="sidebar-item">
                <div class="channel-avatar" style="background-color: #ff0000;">M</div>
                <span class="sidebar-text">Music Channel</span>
            </a>
            <a href="#" class="sidebar-item">
                <div class="channel-avatar" style="background-color: #065fd4;">T</div>
                <span class="sidebar-text">Tech Reviews</span>
            </a>
            <a href="#" class="sidebar-item">
                <div class="channel-avatar" style="background-color: #00aaff;">G</div>
                <span class="sidebar-text">Gaming</span>
            </a>
        </nav>

        <main class="main-content">
            <div class="category-nav">
                <button class="category-btn active">All</button>
                <button class="category-btn">Music</button>
                <button class="category-btn">Gaming</button>
                <button class="category-btn">Live</button>
                <button class="category-btn">Mixes</button>
                <button class="category-btn">Comedy</button>
                <button class="category-btn">Recently uploaded</button>
                <button class="category-btn">Watched</button>
            </div>

            <div class="videos-grid" id="videosGrid">
                <!-- Video cards will be generated by JavaScript -->
            </div>
        </main>
    </div>

    <script>
        // Sample video data
        const videos = [
            {
                id: 1,
                title: "Learn JavaScript in 60 Minutes",
                channel: "Code Masters",
                views: "1.2M views",
                time: "2 days ago",
                duration: "58:42",
                thumbnailColor: "#ff6b6b"
            },
            {
                id: 2,
                title: "Building a YouTube Clone with HTML, CSS & JS",
                channel: "Web Dev Simplified",
                views: "845K views",
                time: "1 week ago",
                duration: "42:15",
                thumbnailColor: "#4ecdc4"
            },
            {
                id: 3,
                title: "Top 10 CSS Tricks You Didn't Know",
                channel: "CSS Wizardry",
                views: "3.5M views",
                time: "3 weeks ago",
                duration: "15:30",
                thumbnailColor: "#45b7d1"
            },
            {
                id: 4,
                title: "Creating Glassmorphism Effects in CSS",
                channel: "UI/UX Design",
                views: "562K views",
                time: "1 month ago",
                duration: "12:45",
                thumbnailColor: "#96ceb4"
            },
            {
                id: 5,
                title: "JavaScript Array Methods Explained",
                channel: "JS Tips",
                views: "2.1M views",
                time: "2 months ago",
                duration: "25:10",
                thumbnailColor: "#ffeaa7"
            },
            {
                id: 6,
                title: "Responsive Web Design Principles",
                channel: "Design Masters",
                views: "1.8M views",
                time: "4 months ago",
                duration: "32:50",
                thumbnailColor: "#dda0dd"
            },
            {
                id: 7,
                title: "Building Netflix Clone from Scratch",
                channel: "Full Stack",
                views: "950K views",
                time: "5 days ago",
                duration: "1:08:22",
                thumbnailColor: "#98d8c8"
            },
            {
                id: 8,
                title: "Modern CSS Layout Techniques",
                channel: "CSS Grid Pro",
                views: "1.5M views",
                time: "2 weeks ago",
                duration: "28:45",
                thumbnailColor: "#f7b76d"
            }
        ];

        // Generate video cards
        const videosGrid = document.getElementById('videosGrid');
        
        videos.forEach(video => {
            const videoCard = document.createElement('div');
            videoCard.className = 'video-card';
            videoCard.innerHTML = `
                <div class="thumbnail">
                    <div class="thumbnail-img" style="background-color: ${video.thumbnailColor};"></div>
                    <span class="duration">${video.duration}</span>
                </div>
                <div class="video-info">
                    <div class="channel-avatar">${video.channel.charAt(0)}</div>
                    <div class="video-details">
                        <h3 class="video-title">${video.title}</h3>
                        <p class="channel-name">${video.channel}</p>
                        <p class="video-stats">${video.views} • ${video.time}</p>
                    </div>
                </div>
            `;
            videosGrid.appendChild(videoCard);
        });

        // Toggle sidebar on mobile
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        
        menuBtn.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
            }
        });

        // Category buttons functionality
        const categoryBtns = document.querySelectorAll('.category-btn');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Search functionality
        const searchInput = document.querySelector('.search-input');
        const searchBtn = document.querySelector('.search-btn');
        
        searchBtn.addEventListener('click', () => {
            if (searchInput.value.trim()) {
                alert(`Searching for: "${searchInput.value}"`);
                searchInput.value = '';
            }
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
                alert(`Searching for: "${searchInput.value}"`);
                searchInput.value = '';
            }
        });

        // Simulate video click
        const videoCards = document.querySelectorAll('.video-card');
        videoCards.forEach(card => {
            card.addEventListener('click', () => {
                alert('Video player would open here in the real YouTube!');
            });
        });
    </script>
</body>
</html>
